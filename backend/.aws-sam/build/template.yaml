AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: nodejs18.x
    Environment:
      Variables:
        NOTES_TABLE:
          Ref: NotesTable
Resources:
  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: personal-notes
      AttributeDefinitions:
      - AttributeName: noteId
        AttributeType: S
      KeySchema:
      - AttributeName: noteId
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  CreateNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateNoteFunction
      Handler: createNote.handler
      Events:
        CreateNote:
          Type: Api
          Properties:
            Path: /notes
            Method: POST
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: NotesTable
    Metadata:
      SamResourceId: CreateNoteFunction
  GetNotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetNotesFunction
      Handler: getNotes.handler
      Events:
        GetNotes:
          Type: Api
          Properties:
            Path: /notes
            Method: GET
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: NotesTable
    Metadata:
      SamResourceId: GetNotesFunction
  DeleteNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DeleteNoteFunction
      Handler: deleteNote.handler
      Events:
        DeleteNote:
          Type: Api
          Properties:
            Path: /notes/{noteId}
            Method: DELETE
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: NotesTable
    Metadata:
      SamResourceId: DeleteNoteFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
